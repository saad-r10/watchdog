[build]
builder = "nixpacks"

[[services]]
name = "watchdog-backend"

[services.build]
buildCommand = "npm install && cd apps/backend && npx prisma generate && npm run build"

[services.deploy]
startCommand = "cd apps/backend && npx prisma migrate deploy && node dist/index.js"
healthcheckPath = "/health"

[[services]]
name = "watchdog-worker"

[services.build]
buildCommand = "npm install && cd apps/backend && npx prisma generate && npm run build"

[services.deploy]
startCommand = "cd apps/backend && node dist/worker.js"

[[services]]
name = "watchdog-frontend"

[services.build]
buildCommand = "npm install && cd apps/frontend && npm run build"

[services.deploy]
startCommand = "cd apps/frontend && npx vite preview --port $PORT --host"
