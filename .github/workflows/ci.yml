name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - run: npm install
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - run: npm install
      - run: npm run typecheck

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - run: npm install
      - name: Run unit tests (no DB required)
        run: cd apps/backend && npx jest --testPathPattern="__tests__/unit" --runInBand
        env:
          NODE_ENV: test

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.27.2/gitleaks_8.27.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
      - name: Scan for secrets
        run: gitleaks detect --config .gitleaks.toml --source . --exit-code 1

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - run: npm install
      - name: Audit root workspace
        run: npm audit --audit-level=high
      - name: Audit backend
        run: cd apps/backend && npm audit --audit-level=high
      - name: Audit frontend
        run: cd apps/frontend && npm audit --audit-level=high
      - name: Audit shared-types
        run: cd packages/shared-types && npm audit --audit-level=high

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: watchdog
          POSTGRES_PASSWORD: watchdog
          POSTGRES_DB: watchdog_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://watchdog:watchdog@localhost:5432/watchdog_test
      JWT_SECRET: ci-test-secret-do-not-use-in-production
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - run: npm install
      - run: cd apps/backend && npx prisma db push
      - name: Run integration tests
        run: cd apps/backend && npx jest --testPathPattern="__tests__/[^/]+\.test\.ts$" --runInBand
