name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run typecheck

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: Run unit tests (no DB required)
        run: cd apps/backend && npx jest --testPathPattern="__tests__/unit" --runInBand
        env:
          NODE_ENV: test

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: watchdog
          POSTGRES_PASSWORD: watchdog
          POSTGRES_DB: watchdog_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://watchdog:watchdog@localhost:5432/watchdog_test
      JWT_SECRET: ci-test-secret-do-not-use-in-production
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: cd apps/backend && npx prisma migrate deploy
      - name: Run integration tests
        run: cd apps/backend && npx jest --testPathPattern="__tests__/[^/]+\.test\.ts$" --runInBand
